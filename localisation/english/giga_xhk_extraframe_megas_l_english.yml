 decision_xhk_extraframe_add_catapult_desc: "In the galaxy lurks enemies, both material and immaterial. We must build a gate so that we may plunge our swords into their hearts."
 decision_xhk_extraframe_add_catapult_effect: "Spawns a level 0 Quantum Catapult around the frameworld"

