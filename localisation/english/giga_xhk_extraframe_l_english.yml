# vivarium deposit

  deposit_xhk_extraframe_vivarium: "Vivarium Zone"
  deposit_xhk_extraframe_vivarium_desc: "A large zone in the frame dedicated to holding space fauna."

  decision_xhk_extraframe_add_vivarium_deposit: "Create Vivarium Zone"
  decision_xhk_extraframe_add_vivarium_deposit_desc: "While we could make large tanks on our starbases for storing space fauna, why not just dedicate a section of the frame for it?"
  decision_xhk_extraframe_add_vivarium_deposit_effect: "Adds a deposit which provides §H100 Vivarium Capacity§!."

# embassy deposit
  deposit_xhk_extraframe_embassy: "Embassy Complex"
  deposit_xhk_extraframe_embassy_desc: "The diplomatic situation in the galaxy has gotten so complex that we have created a special embassy complex in order to keep track of the metaphorical web that we lurk inside."

  decision_xhk_extraframe_add_embassy_deposit: "Create Embassy Section"
  decision_xhk_extraframe_add_embassy_deposit_desc: "The galaxy is too complex to be easily understood. We must section off an area of the frameworld to specialize in diplomatic affairs."
  decision_xhk_extraframe_add_embassy_deposit_effect: "Produces a small amount of influence."


 # iodizium schlorp
  deposit_xhk_extraframe_iodizium_schlorp: "Iodizium Mine"
  deposit_xhk_extraframe_iodizium_schlorp_desc: "A massive pile of iodizium, literally ripped from the celestial body it was on, ready for mining."

  decision_xhk_extraframe_absorb_iodizium: "Absorb Iodizium Deposit"
  decision_xhk_extraframe_absorb_iodizium_desc: "Tear out the Iodizium here, so that it can be harvested safely on the frame."
  decision_xhk_extraframe_absorb_iodizium_effect: "Removes the Iodizium on this body, but adds 100 Iodizium miner jobs on the frameworld."

 # bulk matter / sparble hydrogen
  decision_xhk_extraframe_add_bulk_matter_decompress: "Upgrade Bulk Matter Decompressor"
  decision_xhk_extraframe_add_bulk_matter_decompress_desc: "With our knowledge of bulk matter harvesting, we can apply this to the integrated decompressor to get a small but consistent harvest of bulk matter."
  decision_xhk_extraframe_add_bulk_matter_decompress_effect: "Allows the frame to generate §G0.1§! £giga_sr_bulk_matter£§IBulk Matter§! every month.\n\n§YFor compatibility purposes, this bonus is applied to the District Control planetary feature.§!"

  decision_xhk_extraframe_add_hydrogen_decompress: "Upgrade Hydrogen Decompressor"
  decision_xhk_extraframe_add_hydrogen_decompress_desc: "With our knowledge of extracting hydrogen from gas giants, we can apply this to the integrated decompressor to get a consistent harvest of hydrogen."
  decision_xhk_extraframe_add_hydrogen_decompress_effect: "Allows the frame to generate §G75§! £sr_hydrogen£§IHydrogen§! every month.\n\n§YFor compatibility purposes, this bonus is applied to the District Control planetary feature.§!"

