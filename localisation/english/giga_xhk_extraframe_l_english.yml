  xhk_extraframe_notif.200.desc: "We have finished analysis of the unique Fallen Empire building. We can begin integration of some of it's technology into the Frame by building a §G$building_xhk_extraframe_fe_analysis$§! building."
  xhk_extraframe_notif.200.a: "Excellent."

